<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Neuro Vista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="page-register" class="page auth-page active">
  <div class="auth-left register-left">
    <div class="auth-brand" onclick="showPage('page-landing')">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">Neuro Vista</span>
    </div>
    <div class="auth-tagline">
      <h2>Join the<br/>platform.</h2>
      <p>Leverage AI-powered early detection to take control of your health.</p>
    </div>
    <div class="auth-decoration">
      <div class="deco-ring r1"></div>
      <div class="deco-ring r2"></div>
    </div>
  </div>

  <div class="auth-right">
    <form id="registerForm" class="auth-form-wrap" onsubmit="event.preventDefault(); handleRegister();">
      <h3>Create Account</h3>
      <p class="auth-sub">Set up your personal health profile</p>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Saad Ahmed" class="form-input" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="your@email.com" class="form-input" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Minimum 8 characters" class="form-input" required />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="Re-enter password" class="form-input" required />
      </div>
      <button type="submit" class="btn-form">Create Account →</button>
      <p class="auth-switch">Already have an account? <a href="#" onclick="showPage('page-login')">Sign in</a></p>
    </form>

    <form id="confirmRegisterForm" class="auth-form-wrap" style="display:none;" onsubmit="event.preventDefault(); handleRegisterConfirm();">
      <h3>Confirm Email</h3>
      <p class="auth-sub" id="registerSubText">Enter the 6-digit code sent to your email address.</p>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="confirmRegEmail" class="form-input" readonly />
      </div>
      <div class="form-group">
        <label>Verification Code</label>
        <input type="text" id="regCode" placeholder="Enter 6-digit code" class="form-input" required maxlength="6" pattern="\d{6}" />
      </div>
      <button type="submit" class="btn-form">Verify & Finish</button>
      <p class="auth-switch">Already have an account? <a href="#" onclick="showPage('page-login')">Sign in</a></p>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
